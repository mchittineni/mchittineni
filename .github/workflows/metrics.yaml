name: 📊 GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    # 00:00 on the 1st of every month
    - cron: "0 0 1 * *"

permissions:
  issues: write
  pull-requests: read
  contents: write

# Avoid overlapping runs racing on the committed SVGs
concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

env:
  METRICS_USER: mchittineni
  METRICS_TIMEZONE: London
  METRICS_DIR: assets/metrics
  METRICS_LANGUAGES_IGNORED: >-
    html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot

jobs:
  github-metrics:
    name: Generate metrics
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # FULL METRICS (STABLE)
      # -------------------------------------------------------
      - name: Full metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ env.METRICS_USER }}
          filename: ${{ env.METRICS_DIR }}/github-metrics.svg
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: ${{ env.METRICS_TIMEZONE }}
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5
          plugin_activity_visibility: all
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_calendar: yes
          plugin_calendar_limit: 1
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_charts_type: classic
          plugin_habits_facts: yes
          plugin_habits_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: ${{ env.METRICS_LANGUAGES_IGNORED }}
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1
          plugin_traffic: yes

      # -------------------------------------------------------
      # CONTRIBUTION CALENDAR
      # -------------------------------------------------------
      - name: Full-year calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: ${{ env.METRICS_DIR }}/metrics.plugin.isocalendar.fullyear.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # -------------------------------------------------------
      # HABITS
      # -------------------------------------------------------
      - name: Habits (charts)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: ${{ env.METRICS_DIR }}/metrics.plugin.habits.charts.svg
          plugin_habits: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          config_timezone: ${{ env.METRICS_TIMEZONE }}

      - name: Habits (facts)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: ${{ env.METRICS_DIR }}/metrics.plugin.habits.facts.svg
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          config_timezone: ${{ env.METRICS_TIMEZONE }}

  reports:
    name: Monthly reports
    runs-on: ubuntu-latest
    needs: github-metrics

    steps:
      # -------------------------------------------------------
      # DATE CALCULATION
      # -------------------------------------------------------
      - name: Get dates for last month
        run: |
          first_date=$(date -d "last month" +%Y-%m-01)
          last_date=$(date -d "$first_date +1 month -1 day" +%Y-%m-%d)
          echo "START_DATE=$first_date" >> "$GITHUB_ENV"
          echo "END_DATE=$last_date" >> "$GITHUB_ENV"
          echo "last_month=$first_date..$last_date" >> "$GITHUB_ENV"

      # -------------------------------------------------------
      # ISSUE METRICS
      # -------------------------------------------------------
      - name: Report on GitHub issues
        uses: github/issue-metrics@v3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEARCH_QUERY: 'mchittineni/${{ github.event.repository.name }} is:issue created:${{ env.last_month }} -reason:"not planned"'

      - name: Create issue metrics report
        uses: peter-evans/create-issue-from-file@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Monthly GitHub Issue Metrics Report
          content-filepath: ./issue_metrics.md
          assignees: mchittineni

      # -------------------------------------------------------
      # CONTRIBUTORS
      # -------------------------------------------------------
      - name: Run contributor action
        uses: github/contributors@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          START_DATE: ${{ env.START_DATE }}
          END_DATE: ${{ env.END_DATE }}
          REPOSITORY: mchittineni/${{ github.event.repository.name }}

      - name: Create contributors report
        uses: peter-evans/create-issue-from-file@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Monthly Contributor's Report
          content-filepath: ./contributors.md
          assignees: mchittineni
